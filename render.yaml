services:
  - type: web
    name: wealthwise-india
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build && npx drizzle-kit push --force
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: wealthwise-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_SECRET
        generateValue: true
      # Optional: Kimi OAuth (leave empty to disable)
      - key: VITE_APP_ID
        sync: false
      - key: VITE_KIMI_AUTH_URL
        sync: false
      - key: APP_ID
        sync: false
      - key: KIMI_AUTH_URL
        sync: false
      - key: KIMI_OPEN_URL
        sync: false
      # Optional: AI Chat (Moonshot API)
      - key: MOONSHOT_API_KEY
        sync: false
    healthCheckPath: /api/ping

databases:
  - name: wealthwise-db
    plan: free
    region: oregon
    ipAllowList: []
