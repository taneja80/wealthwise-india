services:
  - type: web
    name: wealthwise-india
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build && npx drizzle-kit push --force
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wealthwise-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_ID
        sync: false
      - key: VITE_KIMI_AUTH_URL
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
    healthCheckPath: /api/ping

databases:
  - name: wealthwise-db
    plan: free
    region: oregon
    ipAllowList: []
